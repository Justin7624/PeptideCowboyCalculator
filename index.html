<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peptide Cowboy Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4af37}
body{margin:0;font-family:'Inter',sans-serif;background:radial-gradient(circle,#1a1a1a,#000);color:white}

.header{padding:12px 16px;background:linear-gradient(90deg,#111,#1c1c1c);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333}
.header h1{font-family:'Rye';color:var(--gold);margin:0;font-size:26px}
.badge{border:1px solid var(--gold);padding:6px 12px;border-radius:20px;font-size:12px;color:var(--gold)}

.container{display:flex;gap:14px;padding:14px;flex-wrap:wrap}
.card{flex:1;min-width:300px;background:linear-gradient(145deg,#1c1c1c,#0f0f0f);border-radius:14px;padding:18px;box-shadow:0 0 25px rgba(212,175,55,0.15)}

h2{color:var(--gold);margin:0 0 10px}
p{color:#bbb;font-size:13px}

.row{display:flex;gap:10px}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#111;color:white}

.presets button{margin:4px;padding:8px 12px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:var(--gold);cursor:pointer}
.presets button:hover{background:var(--gold);color:black}

.result-main{font-size:22px;font-weight:700;margin:10px 0;background:linear-gradient(90deg,#fff,var(--gold),#fff);-webkit-background-clip:text;color:transparent}

.result-grid{display:flex;gap:10px;margin-top:10px}
.box{flex:1;background:#111;padding:12px;border-radius:10px}

.scaleWrap{margin-top:15px;background:#111;padding:10px;border-radius:14px}
.scaleBar{height:45px;position:relative;background:#0d0d0d;border-radius:10px}
.tick{position:absolute;bottom:0;width:1px;height:8px;background:#777}
.tick.major{height:18px;background:var(--gold)}
.indicator{position:absolute;top:0;width:4px;height:100%;background:var(--gold);box-shadow:0 0 12px var(--gold)}

.footer{text-align:center;font-size:12px;color:#aaa;padding:8px}
</style>
</head>
<body>

<div class="header">
<h1>Peptide Cowboy Calculator</h1>
<div class="badge">Research Use Only</div>
</div>

<div class="container">

<div class="card">
<h2>Vial & Dose Settings</h2>
<p>Enter vial strength, diluent, and desired dose.</p>

<div class="row">
<input id="vial" type="number" value="5">
<select id="unitVial"><option>mg</option></select>
</div>

<label>Total Diluent Added (mL)</label>
<input id="diluent" type="number" value="1">

<label>Insulin Syringe Scale</label>
<select id="scale"><option value="100">100 units</option><option value="50">50 units</option></select>

<label>Desired Dose</label>
<div class="row">
<input id="dose" type="number" value="0.5">
<select id="doseUnit"><option value="mg">mg</option><option value="mcg">mcg</option></select>
</div>

<p>Quick presets</p>
<div class="presets">
<button onclick="preset(1)">1 MG</button>
<button onclick="preset(2)">2 MG</button>
<button onclick="preset(5)">5 MG</button>
<button onclick="preset(10)">10 MG</button>
</div>

</div>

<div class="card">
<h2>Pull This Amount</h2>
<p>The calculator converts your dose into syringe units.</p>

<div class="result-main" id="mainResult"></div>
<p id="mlText"></p>

<div class="result-grid">
<div class="box" id="unitsBox"></div>
<div class="box" id="perUnitBox"></div>
</div>

<div class="scaleWrap">
<div class="scaleBar" id="scaleBar"></div>
</div>

<p style="margin-top:10px;font-size:12px;color:#888">Visual helper only — not a medical device.</p>

</div>

</div>

<div class="footer">Research use only. Not medical advice.</div>

<script>
function preset(v){dose.value=v;calculate()}

function buildScale(max){
scaleBar.innerHTML='';
for(let i=0;i<=max;i++){
let t=document.createElement('div');
t.className='tick '+(i%10===0?'major':'');
t.style.left=(i/max*100)+'%';
scaleBar.appendChild(t)
}
}

function calculate(){
let vialVal=parseFloat(vial.value)
let dil=parseFloat(diluent.value)
let doseVal=parseFloat(dose.value)
let unit=doseUnit.value
let scaleVal=parseFloat(scale.value)

if(unit==='mcg') doseVal/=1000

let mgPerMl=vialVal/dil
let ml=doseVal/mgPerMl
let units=ml*scaleVal

mainResult.innerText=`For a dose of ${dose.value} ${unit}, draw to ${units.toFixed(2)} units.`
mlText.innerText=`≈ ${ml.toFixed(3)} mL`
unitsBox.innerText=`${units.toFixed(2)} units`
perUnitBox.innerText=`${(mgPerMl/scaleVal).toFixed(4)} mg / unit`

buildScale(scaleVal)
let ind=document.createElement('div')
ind.className='indicator'
ind.style.left=(units/scaleVal*100)+'%'
scaleBar.appendChild(ind)
}

[vial,diluent,dose,doseUnit,scale].forEach(e=>e.addEventListener('input',calculate))
calculate()
</script>

</body>
</html>
